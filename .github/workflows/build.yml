name: Build APK with Buildozer Action

# Триггеры для запуска сборки: при пуше в ветку 'main' или вручную
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      # 1. Клонирование кода из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Сборка APK с помощью готового действия
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          workdir: . # Указывает, что buildozer.spec находится в корне проекта
          buildozer_version: stable # Использует последнюю стабильную версию Buildozer

      # 3. Загрузка собранного APK-файла как артефакта
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra-music-player-apk
          path: ${{ steps.buildozer.outputs.filename }}
