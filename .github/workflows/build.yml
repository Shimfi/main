name: Build APK Final
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk unzip zlib1g-dev

      - name: Install Python dependencies with pinned versions
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools==69.5.1" "wheel" "cython==0.29.36"
          pip install buildozer

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra-music-player-apk
          path: bin/*.apk
